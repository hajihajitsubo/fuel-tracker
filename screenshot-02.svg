<svg width="630" height="1365" viewBox="0 0 630 1365" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,'Hiragino Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a1f"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e3550"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="sc">
      <rect x="128" y="548" width="374" height="744" rx="36"/>
    </clipPath>
  </defs>

  <rect width="630" height="1365" fill="url(#bg)"/>
  <ellipse cx="200" cy="350" rx="280" ry="240" fill="url(#glow1)"/>
  <ellipse cx="450" cy="800" rx="240" ry="200" fill="url(#glow2)"/>

  <!-- Headline -->
  <text x="315" y="110" text-anchor="middle" fill="#6b7280" font-size="13" letter-spacing="3" font-weight="500">QUICK INPUT</text>
  <text x="315" y="175" text-anchor="middle" fill="#e8eaf0" font-size="55" font-weight="800" letter-spacing="-2">スタンドで</text>
  <text x="315" y="248" text-anchor="middle" fill="#22c55e" font-size="55" font-weight="800" letter-spacing="-2">3秒入力完了。</text>
  <text x="315" y="308" text-anchor="middle" fill="#6b7280" font-size="18">迷わず入力できるシンプルなフォーム</text>

  <!-- Phone frame -->
  <rect x="100" y="348" width="430" height="920" rx="58" fill="url(#frame)" stroke="#3a4060" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="115" y="362" width="400" height="892" rx="46" fill="#11141a"/>
  <rect x="250" y="376" width="130" height="26" rx="13" fill="#000"/>
  <rect x="96" y="490" width="5" height="55" rx="2.5" fill="#252a38"/>
  <rect x="96" y="558" width="5" height="55" rx="2.5" fill="#252a38"/>
  <rect x="96" y="448" width="5" height="32" rx="2.5" fill="#252a38"/>
  <rect x="529" y="510" width="5" height="72" rx="2.5" fill="#252a38"/>

  <g clip-path="url(#sc)">
    <rect x="128" y="548" width="374" height="744" fill="#11141a"/>

    <!-- Status bar -->
    <text x="148" y="574" fill="#9ca3af" font-size="12" font-weight="600">9:41</text>
    <rect x="456" y="565" width="26" height="13" rx="3" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    <rect x="457.5" y="566.5" width="18" height="10" rx="1.5" fill="#9ca3af"/>
    <rect x="482" y="569" width="3" height="6" rx="1" fill="#9ca3af"/>
    <rect x="432" y="569" width="3" height="9" rx="1" fill="#9ca3af"/>
    <rect x="437" y="566" width="3" height="12" rx="1" fill="#9ca3af"/>
    <rect x="442" y="563" width="3" height="15" rx="1" fill="#9ca3af"/>
    <rect x="447" y="560" width="3" height="18" rx="1" fill="#9ca3af"/>

    <!-- Header -->
    <text x="148" y="612" fill="#e8eaf0" font-size="19" font-weight="700">⛽ 燃費トラッカー</text>
    <text x="148" y="628" fill="#6b7280" font-size="10" letter-spacing="1.5">MY FUEL LOG</text>
    <text x="488" y="616" text-anchor="end" fill="#3b82f6" font-size="26" font-weight="800">12</text>
    <text x="488" y="630" text-anchor="end" fill="#6b7280" font-size="10">給油回数</text>

    <!-- First notice card -->
    <rect x="140" y="644" width="350" height="62" rx="14" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.25)" stroke-width="0.8"/>
    <text x="158" y="664" fill="#f59e0b" font-size="16">📍</text>
    <text x="180" y="664" fill="#f59e0b" font-size="12" font-weight="700">初回登録 — 基準点として保存されます</text>
    <text x="180" y="680" fill="#6b7280" font-size="10.5">次回給油時から実燃費・走行距離が自動計算されます。</text>
    <text x="180" y="696" fill="#6b7280" font-size="10.5">まずはOdoメーターの値から入力してください。</text>

    <!-- Input card -->
    <rect x="140" y="720" width="350" height="316" rx="16" fill="#1a1f2e" stroke="#252a38" stroke-width="1"/>
    <!-- Header row -->
    <rect x="152" y="732" width="3" height="12" fill="#3b82f6"/>
    <text x="160" y="742" fill="#6b7280" font-size="10" letter-spacing="2" font-weight="600">給油データ入力</text>
    <!-- Full tank toggle -->
    <rect x="428" y="730" width="46" height="24" rx="12" fill="#3b82f6"/>
    <circle cx="462" cy="742" r="10" fill="white"/>
    <text x="420" y="744" text-anchor="end" fill="#6b7280" font-size="10">満タン</text>

    <!-- Date field -->
    <text x="152" y="770" fill="#6b7280" font-size="9" letter-spacing="1">給油日</text>
    <rect x="152" y="775" width="326" height="36" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="168" y="797" fill="#e8eaf0" font-size="15" font-weight="500">2026/05/28</text>

    <!-- Odo field (active / focused) -->
    <text x="152" y="824" fill="#6b7280" font-size="9" letter-spacing="1">ODO METER</text>
    <text x="478" y="824" text-anchor="end" fill="#3b82f6" font-size="9" font-weight="600">前回 15,000 km</text>
    <rect x="152" y="829" width="326" height="36" rx="10" fill="#0d1017" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="152" y="829" width="326" height="36" rx="10" fill="rgba(59,130,246,0.05)"/>
    <text x="168" y="851" fill="#e8eaf0" font-size="16" font-weight="500">15,420</text>
    <text x="472" y="851" text-anchor="end" fill="#6b7280" font-size="13">km</text>
    <!-- Cursor blink -->
    <rect x="244" y="836" width="2" height="20" rx="1" fill="#3b82f6" opacity="0.9"/>

    <!-- Liter field -->
    <text x="152" y="878" fill="#6b7280" font-size="9" letter-spacing="1">給油量 (L)</text>
    <rect x="152" y="883" width="155" height="36" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="168" y="905" fill="#e8eaf0" font-size="16" font-weight="500">35.5</text>
    <text x="300" y="905" text-anchor="end" fill="#6b7280" font-size="13">L</text>

    <!-- Amount field -->
    <text x="323" y="878" fill="#6b7280" font-size="9" letter-spacing="1">合計金額 (円)</text>
    <rect x="323" y="883" width="155" height="36" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="339" y="905" fill="#e8eaf0" font-size="16" font-weight="500">5,800</text>
    <text x="472" y="905" text-anchor="end" fill="#6b7280" font-size="13">円</text>

    <!-- Save button -->
    <rect x="152" y="932" width="326" height="44" rx="14" fill="url(#btn)"/>
    <text x="315" y="958" text-anchor="middle" fill="white" font-size="16" font-weight="700" letter-spacing="0.5">記録する</text>

    <!-- iOS Keyboard suggestion bar -->
    <rect x="128" y="1048" width="374" height="40" fill="#1e2330" stroke="#252a38" stroke-width="0.8"/>
    <text x="200" y="1072" text-anchor="middle" fill="#e8eaf0" font-size="14">15,000</text>
    <line x1="260" y1="1055" x2="260" y2="1083" stroke="#252a38" stroke-width="1"/>
    <text x="315" y="1072" text-anchor="middle" fill="#e8eaf0" font-size="14">15,420</text>
    <line x1="370" y1="1055" x2="370" y2="1083" stroke="#252a38" stroke-width="1"/>
    <text x="430" y="1072" text-anchor="middle" fill="#e8eaf0" font-size="14">15,500</text>

    <!-- iOS numeric keyboard -->
    <rect x="128" y="1088" width="374" height="180" fill="#1a1f2e"/>
    <!-- Row 1 -->
    <rect x="132" y="1094" width="116" height="44" rx="8" fill="#252a38"/><text x="190" y="1121" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">1</text>
    <rect x="254" y="1094" width="116" height="44" rx="8" fill="#252a38"/><text x="312" y="1121" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">2</text>
    <rect x="376" y="1094" width="118" height="44" rx="8" fill="#252a38"/><text x="435" y="1121" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">3</text>
    <!-- Row 2 -->
    <rect x="132" y="1144" width="116" height="44" rx="8" fill="#252a38"/><text x="190" y="1171" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">4</text>
    <rect x="254" y="1144" width="116" height="44" rx="8" fill="#252a38"/><text x="312" y="1171" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">5</text>
    <rect x="376" y="1144" width="118" height="44" rx="8" fill="#252a38"/><text x="435" y="1171" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">6</text>
    <!-- Row 3 -->
    <rect x="132" y="1194" width="116" height="44" rx="8" fill="#252a38"/><text x="190" y="1221" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">7</text>
    <rect x="254" y="1194" width="116" height="44" rx="8" fill="#252a38"/><text x="312" y="1221" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">8</text>
    <rect x="376" y="1194" width="118" height="44" rx="8" fill="#252a38"/><text x="435" y="1221" text-anchor="middle" fill="#e8eaf0" font-size="22" font-weight="400">9</text>

    <!-- Tab bar -->
    <rect x="128" y="1248" width="374" height="44" fill="rgba(17,20,26,0.96)" stroke="#252a38" stroke-width="0.8"/>
    <text x="210" y="1264" text-anchor="middle" fill="#3b82f6" font-size="16">⌂</text>
    <text x="210" y="1278" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">ホーム</text>
    <rect x="204" y="1284" width="12" height="2" rx="1" fill="#3b82f6"/>
    <text x="315" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⌇</text>
    <text x="315" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">グラフ</text>
    <text x="420" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⚙</text>
    <text x="420" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">設定</text>
    <rect x="260" y="1284" width="110" height="4" rx="2" fill="#3a4060"/>
  </g>

  <text x="315" y="1318" text-anchor="middle" fill="#374151" font-size="13" font-weight="500">⛽ 燃費トラッカー</text>
  <text x="315" y="1343" text-anchor="middle" fill="#1f2937" font-size="12">hajihajitsubo.github.io/fuel-tracker</text>
</svg>

<svg width="630" height="1365" viewBox="0 0 630 1365" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,'Hiragino Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e3550"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="sc">
      <rect x="128" y="548" width="374" height="744" rx="36"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="630" height="1365" fill="url(#bg)"/>
  <ellipse cx="315" cy="400" rx="300" ry="260" fill="url(#glow1)"/>
  <ellipse cx="420" cy="900" rx="220" ry="200" fill="url(#glow2)"/>

  <!-- Headline -->
  <text x="315" y="110" text-anchor="middle" fill="#6b7280" font-size="13" letter-spacing="3" font-weight="500">FUEL TRACKER</text>
  <text x="315" y="175" text-anchor="middle" fill="#e8eaf0" font-size="58" font-weight="800" letter-spacing="-2">給油したら、</text>
  <text x="315" y="248" text-anchor="middle" fill="#3b82f6" font-size="58" font-weight="800" letter-spacing="-2">すぐ確認。</text>
  <text x="315" y="308" text-anchor="middle" fill="#6b7280" font-size="18" font-weight="400">実燃費・コスト・走行距離を瞬時に把握</text>

  <!-- Phone frame -->
  <rect x="100" y="348" width="430" height="920" rx="58" fill="url(#frame)" stroke="#3a4060" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Screen bg -->
  <rect x="115" y="362" width="400" height="892" rx="46" fill="#11141a"/>
  <!-- Dynamic island -->
  <rect x="250" y="376" width="130" height="26" rx="13" fill="#000"/>
  <!-- Volume buttons L -->
  <rect x="96" y="490" width="5" height="55" rx="2.5" fill="#252a38"/>
  <rect x="96" y="558" width="5" height="55" rx="2.5" fill="#252a38"/>
  <!-- Silent L -->
  <rect x="96" y="448" width="5" height="32" rx="2.5" fill="#252a38"/>
  <!-- Power R -->
  <rect x="529" y="510" width="5" height="72" rx="2.5" fill="#252a38"/>

  <!-- ── APP UI (clipped to screen) ── -->
  <g clip-path="url(#sc)">
    <rect x="128" y="548" width="374" height="744" fill="#11141a"/>

    <!-- Status bar -->
    <text x="148" y="574" fill="#9ca3af" font-size="12" font-weight="600">9:41</text>
    <!-- Battery -->
    <rect x="456" y="565" width="26" height="13" rx="3" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    <rect x="457.5" y="566.5" width="18" height="10" rx="1.5" fill="#9ca3af"/>
    <rect x="482" y="569" width="3" height="6" rx="1" fill="#9ca3af"/>
    <!-- Signal bars -->
    <rect x="432" y="569" width="3" height="9" rx="1" fill="#9ca3af"/>
    <rect x="437" y="566" width="3" height="12" rx="1" fill="#9ca3af"/>
    <rect x="442" y="563" width="3" height="15" rx="1" fill="#9ca3af"/>
    <rect x="447" y="560" width="3" height="18" rx="1" fill="#9ca3af"/>

    <!-- Header -->
    <text x="148" y="612" fill="#e8eaf0" font-size="19" font-weight="700">⛽ 燃費トラッカー</text>
    <text x="148" y="628" fill="#6b7280" font-size="10" letter-spacing="1.5">MY FUEL LOG</text>
    <text x="488" y="616" text-anchor="end" fill="#3b82f6" font-size="26" font-weight="800">12</text>
    <text x="488" y="630" text-anchor="end" fill="#6b7280" font-size="10">給油回数</text>

    <!-- Dashboard card -->
    <rect x="140" y="644" width="350" height="202" rx="16" fill="#1a1f2e" stroke="#252a38" stroke-width="1"/>
    <rect x="152" y="656" width="3" height="12" fill="#3b82f6"/>
    <text x="160" y="666" fill="#6b7280" font-size="10" letter-spacing="2" font-weight="600">最新の給油結果</text>

    <!-- Big stats -->
    <text x="245" y="720" text-anchor="middle" fill="#3b82f6" font-size="52" font-weight="800" letter-spacing="-2">11.8</text>
    <text x="245" y="738" text-anchor="middle" fill="#6b7280" font-size="12">km/L</text>
    <line x1="315" y1="688" x2="315" y2="745" stroke="#252a38" stroke-width="1"/>
    <text x="385" y="720" text-anchor="middle" fill="#f59e0b" font-size="52" font-weight="800" letter-spacing="-2">420</text>
    <text x="385" y="738" text-anchor="middle" fill="#6b7280" font-size="12">km</text>

    <!-- Small stat pills -->
    <rect x="148" y="754" width="100" height="52" rx="12" fill="#0d1017"/>
    <text x="198" y="771" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="0.5">単価</text>
    <text x="198" y="790" text-anchor="middle" fill="#3b82f6" font-size="17" font-weight="700">165</text>
    <text x="198" y="803" text-anchor="middle" fill="#6b7280" font-size="9">円/L</text>

    <rect x="256" y="754" width="100" height="52" rx="12" fill="#0d1017"/>
    <text x="306" y="771" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="0.5">コスト</text>
    <text x="306" y="790" text-anchor="middle" fill="#f59e0b" font-size="17" font-weight="700">14.0</text>
    <text x="306" y="803" text-anchor="middle" fill="#6b7280" font-size="9">円/km</text>

    <rect x="364" y="754" width="118" height="52" rx="12" fill="#0d1017"/>
    <text x="423" y="771" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="0.5">今回金額</text>
    <text x="423" y="790" text-anchor="middle" fill="#22c55e" font-size="17" font-weight="700">5,800</text>
    <text x="423" y="803" text-anchor="middle" fill="#6b7280" font-size="9">円</text>

    <!-- Range bar -->
    <text x="148" y="828" fill="#6b7280" font-size="10">満タン航続距離の目安</text>
    <text x="488" y="828" text-anchor="end" fill="#22c55e" font-size="10" font-weight="700">約 612 km</text>
    <rect x="148" y="834" width="340" height="7" rx="3.5" fill="#0d1017"/>
    <rect x="148" y="834" width="204" height="7" rx="3.5">
      <defs>
        <linearGradient id="bar">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#22c55e"/>
        </linearGradient>
      </defs>
      <rect width="204" height="7" fill="url(#bar)" rx="3.5"/>
    </rect>
    <rect x="148" y="834" width="204" height="7" rx="3.5" fill="url(#bar)"/>

    <!-- Notice -->
    <rect x="140" y="862" width="350" height="56" rx="14" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.2)" stroke-width="0.8"/>
    <rect x="152" y="875" width="3" height="10" fill="#3b82f6"/>
    <text x="162" y="883" fill="#6b7280" font-size="10" letter-spacing="1">リアルタイムプレビュー</text>
    <text x="152" y="902" fill="#9ca3af" font-size="12">推定燃費</text>
    <text x="488" y="902" text-anchor="end" fill="#3b82f6" font-size="13" font-weight="700">11.8 km/L</text>
    <text x="152" y="914" fill="#9ca3af" font-size="11">単価</text>
    <text x="488" y="914" text-anchor="end" fill="#3b82f6" font-size="12" font-weight="700">163 円/L</text>

    <!-- History header -->
    <rect x="152" y="934" width="3" height="10" fill="#3b82f6"/>
    <text x="162" y="942" fill="#6b7280" font-size="10" letter-spacing="1.5">給油履歴</text>

    <!-- History item -->
    <rect x="140" y="952" width="350" height="72" rx="12" fill="#0d1017" stroke="#252a38" stroke-width="0.8"/>
    <text x="152" y="970" fill="#e8eaf0" font-size="13" font-weight="600">2026/05/28(木)</text>
    <rect x="268" y="959" width="34" height="16" rx="4" fill="rgba(59,130,246,0.15)"/>
    <text x="285" y="970" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="700">最新</text>
    <text x="152" y="990" fill="#6b7280" font-size="11">Odo</text>
    <text x="320" y="990" text-anchor="end" fill="#e8eaf0" font-size="12" font-weight="600">15,420 km</text>
    <text x="332" y="990" fill="#6b7280" font-size="11">単価</text>
    <text x="488" y="990" text-anchor="end" fill="#e8eaf0" font-size="12" font-weight="600">165 円/L</text>
    <line x1="152" y1="1000" x2="488" y2="1000" stroke="#252a38" stroke-width="0.8"/>
    <text x="152" y="1016" fill="#6b7280" font-size="11">実燃費</text>
    <text x="488" y="1016" text-anchor="end" font-size="12" font-weight="700"><tspan fill="#3b82f6">11.8 km/L</tspan><tspan fill="#6b7280" font-weight="400"> · </tspan><tspan fill="#f59e0b">14.0 円/km</tspan></text>

    <!-- Tab bar -->
    <rect x="128" y="1248" width="374" height="44" fill="rgba(17,20,26,0.96)" stroke="#252a38" stroke-width="0.8"/>
    <!-- Home (active) -->
    <text x="210" y="1264" text-anchor="middle" fill="#3b82f6" font-size="16">⌂</text>
    <text x="210" y="1278" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">ホーム</text>
    <rect x="204" y="1284" width="12" height="2" rx="1" fill="#3b82f6"/>
    <!-- Graph -->
    <text x="315" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⌇</text>
    <text x="315" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">グラフ</text>
    <!-- Settings -->
    <text x="420" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⚙</text>
    <text x="420" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">設定</text>
    <!-- Home indicator -->
    <rect x="260" y="1284" width="110" height="4" rx="2" fill="#3a4060"/>
  </g>

  <!-- Branding -->
  <text x="315" y="1318" text-anchor="middle" fill="#374151" font-size="13" font-weight="500">⛽ 燃費トラッカー</text>
  <text x="315" y="1343" text-anchor="middle" fill="#1f2937" font-size="12">hajihajitsubo.github.io/fuel-tracker</text>
</svg>

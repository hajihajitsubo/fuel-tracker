<svg width="630" height="1365" viewBox="0 0 630 1365" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,'Hiragino Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#110e22"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e3550"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="sc">
      <rect x="128" y="548" width="374" height="744" rx="36"/>
    </clipPath>
  </defs>

  <rect width="630" height="1365" fill="url(#bg)"/>
  <ellipse cx="315" cy="360" rx="300" ry="250" fill="url(#glow1)"/>
  <ellipse cx="315" cy="900" rx="250" ry="200" fill="url(#glow2)"/>

  <!-- Headline -->
  <text x="315" y="110" text-anchor="middle" fill="#6b7280" font-size="13" letter-spacing="3" font-weight="500">LIVE PREVIEW</text>
  <text x="315" y="175" text-anchor="middle" fill="#e8eaf0" font-size="52" font-weight="800" letter-spacing="-2">入力しながら、</text>
  <text x="315" y="248" text-anchor="middle" fill="#3b82f6" font-size="52" font-weight="800" letter-spacing="-2">燃費が見える。</text>
  <text x="315" y="308" text-anchor="middle" fill="#6b7280" font-size="18">送信前にミスを即チェック</text>

  <!-- Phone frame -->
  <rect x="100" y="348" width="430" height="920" rx="58" fill="url(#frame)" stroke="#3a4060" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="115" y="362" width="400" height="892" rx="46" fill="#11141a"/>
  <rect x="250" y="376" width="130" height="26" rx="13" fill="#000"/>
  <rect x="96" y="490" width="5" height="55" rx="2.5" fill="#252a38"/>
  <rect x="96" y="558" width="5" height="55" rx="2.5" fill="#252a38"/>
  <rect x="96" y="448" width="5" height="32" rx="2.5" fill="#252a38"/>
  <rect x="529" y="510" width="5" height="72" rx="2.5" fill="#252a38"/>

  <g clip-path="url(#sc)">
    <rect x="128" y="548" width="374" height="744" fill="#11141a"/>

    <text x="148" y="574" fill="#9ca3af" font-size="12" font-weight="600">9:41</text>
    <rect x="456" y="565" width="26" height="13" rx="3" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    <rect x="457.5" y="566.5" width="18" height="10" rx="1.5" fill="#9ca3af"/>
    <rect x="482" y="569" width="3" height="6" rx="1" fill="#9ca3af"/>
    <rect x="432" y="569" width="3" height="9" rx="1" fill="#9ca3af"/>
    <rect x="437" y="566" width="3" height="12" rx="1" fill="#9ca3af"/>
    <rect x="442" y="563" width="3" height="15" rx="1" fill="#9ca3af"/>
    <rect x="447" y="560" width="3" height="18" rx="1" fill="#9ca3af"/>

    <text x="148" y="612" fill="#e8eaf0" font-size="19" font-weight="700">⛽ 燃費トラッカー</text>
    <text x="148" y="628" fill="#6b7280" font-size="10" letter-spacing="1.5">MY FUEL LOG</text>
    <text x="488" y="616" text-anchor="end" fill="#3b82f6" font-size="26" font-weight="800">12</text>
    <text x="488" y="630" text-anchor="end" fill="#6b7280" font-size="10">給油回数</text>

    <!-- Input card (collapsed / filled) -->
    <rect x="140" y="644" width="350" height="256" rx="16" fill="#1a1f2e" stroke="#252a38" stroke-width="1"/>
    <rect x="152" y="656" width="3" height="12" fill="#3b82f6"/>
    <text x="160" y="666" fill="#6b7280" font-size="10" letter-spacing="2" font-weight="600">給油データ入力</text>
    <rect x="428" y="653" width="46" height="24" rx="12" fill="#3b82f6"/>
    <circle cx="462" cy="665" r="10" fill="white"/>
    <text x="420" y="667" text-anchor="end" fill="#6b7280" font-size="10">満タン</text>

    <text x="152" y="693" fill="#6b7280" font-size="9" letter-spacing="1">給油日</text>
    <rect x="152" y="698" width="326" height="32" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="168" y="718" fill="#e8eaf0" font-size="14">2026/05/28</text>

    <text x="152" y="743" fill="#6b7280" font-size="9" letter-spacing="1">ODO METER</text>
    <text x="478" y="743" text-anchor="end" fill="#6b7280" font-size="9">前回 15,000 km</text>
    <rect x="152" y="748" width="326" height="32" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="168" y="768" fill="#e8eaf0" font-size="14">15,420</text>
    <text x="472" y="768" text-anchor="end" fill="#6b7280" font-size="12">km</text>

    <text x="152" y="793" fill="#6b7280" font-size="9" letter-spacing="1">給油量 (L)</text>
    <rect x="152" y="798" width="155" height="32" rx="10" fill="#0d1017" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="168" y="818" fill="#e8eaf0" font-size="14">35.5</text>
    <!-- cursor -->
    <rect x="218" y="804" width="2" height="18" rx="1" fill="#3b82f6"/>

    <text x="323" y="793" fill="#6b7280" font-size="9" letter-spacing="1">合計金額</text>
    <rect x="323" y="798" width="155" height="32" rx="10" fill="#0d1017" stroke="#252a38" stroke-width="1"/>
    <text x="339" y="818" fill="#e8eaf0" font-size="14">5,800</text>
    <text x="472" y="818" text-anchor="end" fill="#6b7280" font-size="12">円</text>

    <rect x="152" y="842" width="326" height="40" rx="12" fill="url(#btn)"/>
    <text x="315" y="866" text-anchor="middle" fill="white" font-size="15" font-weight="700">記録する</text>

    <!-- ── PREVIEW CARD (HIGHLIGHTED) ── -->
    <rect x="140" y="914" width="350" height="130" rx="14" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
    <!-- Glow effect -->
    <rect x="140" y="914" width="350" height="130" rx="14" fill="url(#glow2)" opacity="0.5"/>
    <rect x="152" y="924" width="3" height="12" fill="#3b82f6"/>
    <text x="160" y="934" fill="#6b7280" font-size="10" letter-spacing="2" font-weight="600">リアルタイムプレビュー</text>

    <!-- Preview rows -->
    <text x="152" y="960" fill="#9ca3af" font-size="13">走行距離（前回差分）</text>
    <text x="488" y="960" text-anchor="end" fill="#3b82f6" font-size="14" font-weight="700">420 km</text>

    <line x1="152" y1="970" x2="488" y2="970" stroke="rgba(59,130,246,0.15)" stroke-width="0.8"/>

    <text x="152" y="992" fill="#9ca3af" font-size="13">推定燃費</text>
    <text x="488" y="992" text-anchor="end" fill="#3b82f6" font-size="22" font-weight="800">11.8 <tspan font-size="13" font-weight="400">km/L</tspan></text>

    <line x1="152" y1="1002" x2="488" y2="1002" stroke="rgba(59,130,246,0.15)" stroke-width="0.8"/>

    <text x="152" y="1024" fill="#9ca3af" font-size="13">ガソリン単価</text>
    <text x="488" y="1024" text-anchor="end" fill="#3b82f6" font-size="14" font-weight="700">163 円/L</text>

    <!-- Annotation arrow -->
    <text x="148" y="1070" fill="#f59e0b" font-size="11" font-weight="600">↑ 「記録する」前に確認できる！</text>

    <!-- Tab bar -->
    <rect x="128" y="1248" width="374" height="44" fill="rgba(17,20,26,0.96)" stroke="#252a38" stroke-width="0.8"/>
    <text x="210" y="1264" text-anchor="middle" fill="#3b82f6" font-size="16">⌂</text>
    <text x="210" y="1278" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">ホーム</text>
    <rect x="204" y="1284" width="12" height="2" rx="1" fill="#3b82f6"/>
    <text x="315" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⌇</text>
    <text x="315" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">グラフ</text>
    <text x="420" y="1264" text-anchor="middle" fill="#6b7280" font-size="15">⚙</text>
    <text x="420" y="1278" text-anchor="middle" fill="#6b7280" font-size="9">設定</text>
    <rect x="260" y="1284" width="110" height="4" rx="2" fill="#3a4060"/>
  </g>

  <text x="315" y="1318" text-anchor="middle" fill="#374151" font-size="13" font-weight="500">⛽ 燃費トラッカー</text>
  <text x="315" y="1343" text-anchor="middle" fill="#1f2937" font-size="12">hajihajitsubo.github.io/fuel-tracker</text>
</svg>
